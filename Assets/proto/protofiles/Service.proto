syntax = "proto3";
package frameworkProtos;
//standard protofile with error code and standard heartBeat messages
import "protofiles/errorCode.proto";
import "protofiles/heartBeat.proto";

//user imports from harpia process
import "protofiles/%USER_MESSAGE_FILE_NAME%";

message %USER_MESSAGE%_Message {
    %USER_MESSAGE% msg = 1;
}
//message for the standard functions 
message %USER_MESSAGE%_HeartBeat {
    heartBeat hb = 1;
}

//message for the pullByID function
message %USER_MESSAGE%_ID {
    int32 id = 1;
}
message %USER_MESSAGE%_Stream {
    int32 id = 1;
    string name = 2;
}
service %USER_MESSAGE%_Service {
    rpc heartBeatFor_%USER_MESSAGE%(%USER_MESSAGE%_HeartBeat) returns (%USER_MESSAGE%_HeartBeat) {}
    rpc streamFor_%USER_MESSAGE%(%USER_MESSAGE%_Stream ) returns (stream %USER_MESSAGE%_Message) {}
    rpc pullByIDFor_%USER_MESSAGE%(%USER_MESSAGE%_ID) returns (%USER_MESSAGE%_Message) {}
    rpc pushFor_%USER_MESSAGE%(%USER_MESSAGE%_Message) returns (errorCode) {}
}
