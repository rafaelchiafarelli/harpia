syntax = "proto3";
package frameworkProtos;
//standard protofile with error code and standard heartBeat messages
import "protofiles/errorCode.proto";
import "protofiles/heartBeat.proto";

//user imports from harpia process
import "protofiles/pope_734126ee6efdfbd64a1678bf49ee9683.proto";

message pope_Message {
    pope msg = 1;
}
//message for the standard functions 
message pope_HeartBeat {
    heartBeat hb = 1;
}

//message for the pullByID function
message pope_ID {
    int32 id = 1;
}
message pope_Stream {
    int32 id = 1;
    string name = 2;
}
service pope_Service {
    rpc heartBeat(pope_HeartBeat) returns (pope_HeartBeat) {}
    rpc streamSrc(pope_Stream ) returns (stream pope_Message) {}
    rpc pullByID(pope_ID) returns (pope_Message) {}
    rpc push(pope_Message) returns (errorCode) {}
}
