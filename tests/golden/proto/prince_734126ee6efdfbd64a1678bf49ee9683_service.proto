syntax = "proto3";
package frameworkProtos;
//standard protofile with error code and standard heartBeat messages
import "protofiles/errorCode.proto";
import "protofiles/heartBeat.proto";

//user imports from harpia process
import "protofiles/prince_734126ee6efdfbd64a1678bf49ee9683.proto";

message prince_Message {
    prince msg = 1;
}
//message for the standard functions 
message prince_HeartBeat {
    heartBeat hb = 1;
}

//message for the pullByID function
message prince_ID {
    int32 id = 1;
}
message prince_Stream {
    int32 id = 1;
    string name = 2;
}
service prince_Service {
    rpc heartBeat(prince_HeartBeat) returns (prince_HeartBeat) {}
    rpc streamSrc(prince_Stream ) returns (stream prince_Message) {}
    rpc pullByID(prince_ID) returns (prince_Message) {}
    rpc push(prince_Message) returns (errorCode) {}
}
