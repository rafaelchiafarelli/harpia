syntax = "proto3";
package frameworkProtos;
//standard protofile with error code and standard heartBeat messages
import "protofiles/errorCode.proto";
import "protofiles/heartBeat.proto";

//user imports from harpia process
import "protofiles/grower_734126ee6efdfbd64a1678bf49ee9683.proto";

message grower_Message {
    grower msg = 1;
}
//message for the standard functions 
message grower_HeartBeat {
    heartBeat hb = 1;
}

//message for the pullByID function
message grower_ID {
    int32 id = 1;
}
message grower_Stream {
    int32 id = 1;
    string name = 2;
}
service grower_Service {
    rpc heartBeat(grower_HeartBeat) returns (grower_HeartBeat) {}
    rpc streamSrc(grower_Stream ) returns (stream grower_Message) {}
    rpc pullByID(grower_ID) returns (grower_Message) {}
    rpc push(grower_Message) returns (errorCode) {}
}
