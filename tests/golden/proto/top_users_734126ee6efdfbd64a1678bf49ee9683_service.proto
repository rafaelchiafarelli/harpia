syntax = "proto3";
package frameworkProtos;
//standard protofile with error code and standard heartBeat messages
import "protofiles/errorCode.proto";
import "protofiles/heartBeat.proto";

//user imports from harpia process
import "protofiles/top_users_734126ee6efdfbd64a1678bf49ee9683.proto";

message top_users_Message {
    top_users msg = 1;
}
//message for the standard functions 
message top_users_HeartBeat {
    heartBeat hb = 1;
}

//message for the pullByID function
message top_users_ID {
    int32 id = 1;
}
message top_users_Stream {
    int32 id = 1;
    string name = 2;
}
service top_users_Service {
    rpc heartBeat(top_users_HeartBeat) returns (top_users_HeartBeat) {}
    rpc streamSrc(top_users_Stream ) returns (stream top_users_Message) {}
    rpc pullByID(top_users_ID) returns (top_users_Message) {}
    rpc push(top_users_Message) returns (errorCode) {}
}
