syntax = "proto3";
package frameworkProtos;
//standard protofile with error code and standard heartBeat messages
import "protofiles/errorCode.proto";
import "protofiles/heartBeat.proto";

//user imports from harpia process
import "protofiles/vip_users_734126ee6efdfbd64a1678bf49ee9683.proto";

message vip_users_Message {
    vip_users msg = 1;
}
//message for the standard functions 
message vip_users_HeartBeat {
    heartBeat hb = 1;
}

//message for the pullByID function
message vip_users_ID {
    int32 id = 1;
}
message vip_users_Stream {
    int32 id = 1;
    string name = 2;
}
service vip_users_Service {
    rpc heartBeat(vip_users_HeartBeat) returns (vip_users_HeartBeat) {}
    rpc streamSrc(vip_users_Stream ) returns (stream vip_users_Message) {}
    rpc pullByID(vip_users_ID) returns (vip_users_Message) {}
    rpc push(vip_users_Message) returns (errorCode) {}
}
