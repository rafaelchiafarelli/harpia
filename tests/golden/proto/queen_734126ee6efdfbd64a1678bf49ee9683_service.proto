syntax = "proto3";
package frameworkProtos;
//standard protofile with error code and standard heartBeat messages
import "protofiles/errorCode.proto";
import "protofiles/heartBeat.proto";

//user imports from harpia process
import "protofiles/queen_734126ee6efdfbd64a1678bf49ee9683.proto";

message queen_Message {
    queen msg = 1;
}
//message for the standard functions 
message queen_HeartBeat {
    heartBeat hb = 1;
}

//message for the pullByID function
message queen_ID {
    int32 id = 1;
}
message queen_Stream {
    int32 id = 1;
    string name = 2;
}
service queen_Service {
    rpc heartBeat(queen_HeartBeat) returns (queen_HeartBeat) {}
    rpc streamSrc(queen_Stream ) returns (stream queen_Message) {}
    rpc pullByID(queen_ID) returns (queen_Message) {}
    rpc push(queen_Message) returns (errorCode) {}
}
